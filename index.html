<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スポーツタイマー</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body
  id="app-body"
  class="flex flex-col select-none cursor-pointer transition-colors duration-150 bg-emerald-500"
>
  <div id="time-container" class="flex-1 min-h-0 flex items-center justify-center overflow-hidden">
    <div id="time-display" class="tabular-nums font-bold text-white whitespace-nowrap">00:00:00</div>
  </div>
  <div id="history-container" class="flex-none w-full max-h-[35vh] overflow-y-auto bg-black/20">
    <ol id="history-list" class="text-white text-sm sm:text-base font-mono list-none m-0 p-3 space-y-1"></ol>
  </div>
  <script src="script.js"></script>
</body>
</html>
