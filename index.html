<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スポーツタイマー</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body
  id="app-body"
  class="relative flex flex-col select-none cursor-pointer transition-colors duration-150 bg-emerald-500"
>
  <button
    id="sound-toggle-btn"
    type="button"
    aria-pressed="true"
    aria-label="音を消す"
    class="absolute top-3 right-3 sm:top-4 sm:right-4 z-10 flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-black/20 text-white cursor-pointer"
  >
    <svg id="icon-sound-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-6 h-6 sm:w-7 sm:h-7">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.5a.75.75 0 01-.75-.75V9a.75.75 0 01.75-.75h2.25z" />
    </svg>
    <svg id="icon-sound-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="hidden w-6 h-6 sm:w-7 sm:h-7">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.5a.75.75 0 01-.75-.75V9a.75.75 0 01.75-.75h2.25z" />
    </svg>
  </button>
  <div id="time-container" class="flex-1 min-h-0 flex items-center justify-center overflow-hidden">
    <div id="time-display" class="tabular-nums font-bold text-white whitespace-nowrap">00:00:00</div>
  </div>
  <div id="history-container" class="flex-none w-full max-h-[35vh] overflow-y-auto bg-black/20">
    <ol id="history-list" class="text-white text-sm sm:text-base font-mono list-none m-0 p-3 space-y-1"></ol>
  </div>
  <script src="script.js"></script>
</body>
</html>
